<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Mekanika Teknik - Save to PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 850px; margin: auto; padding: 20px; background-color: #f0f2f5; color: #333; }
        .main-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 5px; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        h3 { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-weight: normal; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e1e4e8; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: #34495e; }
        input[type="text"], input[type="date"] { width: 100%; padding: 10px; border: 1px solid #dcdfe6; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .question-card { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e1e4e8; page-break-inside: avoid; }
        .question-text { font-weight: bold; margin-bottom: 15px; color: #2c3e50; }
        .options-list { list-style: none; padding: 0; }
        /* Menggeser radio button ke kiri rata dengan teks */
        .option-item { display: flex; align-items: center; margin-bottom: 12px; padding: 12px; border-radius: 6px; border: 1px solid #f0f0f0; transition: background 0.2s; cursor: pointer; }
        .option-item:hover { background-color: #f0f7ff; }
        .option-item input[type="radio"] { margin-right: 15px; cursor: pointer; width: 18px; height: 18px; flex-shrink: 0; }
        .option-label { cursor: pointer; font-size: 15px; color: #444; }
        .btn-box { text-align: center; margin-top: 30px; padding-bottom: 50px; }
        #btn-save-pdf { background: #27ae60; color: white; padding: 15px 40px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2); }
        #btn-save-pdf:hover { background: #219150; transform: translateY(-2px); }
        
        @media print {
            #btn-save-pdf { display: none; }
            body { background: white; padding: 0; }
            .main-container { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <div id="quiz-area" class="main-container">
        <h1>Kuis Mekanika Teknik</h1>
        <h3>Materi: Skalar & Vektor (Pertemuan 2)</h3>
        
        <div class="info-grid">
            <div class="input-group">
                <label>Nama Mahasiswa:</label>
                <input type="text" id="std-nama" placeholder="Ketik nama lengkap...">
            </div>
            <div class="input-group">
                <label>NIM:</label>
                <input type="text" id="std-nim" placeholder="Ketik NIM...">
            </div>
            <div class="input-group">
                <label>Kelas:</label>
                <input type="text" id="std-kelas" placeholder="Ketik kelas...">
            </div>
            <div class="input-group">
                <label>Tanggal:</label>
                <input type="date" id="std-tgl">
            </div>
        </div>

        <form id="quizForm">
            <div class="question-card">
                <div class="question-text">19. Metode penjumlahan vektor "Ujung ke pangkal" disebut juga...</div>
                <div class="options-list">
                    <label class="option-item">
                        <input type="radio" name="q19">
                        <span class="option-label">Analitis</span>
                    </label>
                    <label class="option-item">
                        <input type="radio" name="q19">
                        <span class="option-label">Head-to-tail</span>
                    </label>
                    <label class="option-item">
                        <input type="radio" name="q19">
                        <span class="option-label">Cross product</span>
                    </label>
                </div>
            </div>

            <div class="question-card">
                <div class="question-text">20. Dalam dot product, jika gaya tegak lurus perpindahan, maka usaha adalah...</div>
                <div class="options-list">
                    <label class="option-item">
                        <input type="radio" name="q20">
                        <span class="option-label">Maksimal</span>
                    </label>
                    <label class="option-item">
                        <input type="radio" name="q20">
                        <span class="option-label">Nol</span>
                    </label>
                    <label class="option-item">
                        <input type="radio" name="q20">
                        <span class="option-label">Negatif</span>
                    </label>
                </div>
            </div>
            
            </form>
    </div>

    <div class="btn-box">
        <button type="button" id="btn-save-pdf" onclick="exportToPDF()">Save to PDF</button>
    </div>

    <script>
        function exportToPDF() {
            const element = document.getElementById('quiz-area');
            const nim = document.getElementById('std-nim').value || 'MHS';
            
            const options = {
                margin:       [0.5, 0.5],
                filename:     'Hasil_Kuis_Mekanika_' + nim + '.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(options).from(element).save();
        }
    </script>

</body>
</html>
